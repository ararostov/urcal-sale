name: Telegram Notify

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram notification
        shell: bash
        run: |
          DATE=$(TZ='Europe/London' date '+%d.%m.%Y, %H:%M')
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -1)

          MESSAGE="🏠 Обновился документ о продаже дома в Urcal 📅 ${DATE}%0A%0AЧто обновилось?%0A• ${COMMIT_MSG}%0A%0A🔗 Подробнее: https://ararostov.github.io/urcal-sale/"

          curl -s "https://api.callmebot.com/text.php?user=@aralondon&text=${MESSAGE}"
