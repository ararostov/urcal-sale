name: Telegram Notify

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram notification
        shell: bash
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          DATE=$(TZ='Europe/London' date '+%d.%m.%Y, %H:%M')
          FIRST_LINE=$(printf '%s\n' "$COMMIT_MSG" | head -1)
          if printf '%s' "$FIRST_LINE" | grep -q '^Merge pull request'; then
            SUMMARY=$(printf '%s\n' "$COMMIT_MSG" | awk 'NR>1 && NF {print; exit}')
          else
            SUMMARY="$FIRST_LINE"
          fi
          SUMMARY=${SUMMARY:-Обновление на сайте}

          MESSAGE="🏠 На сайте про дом в Urcal есть обновление, посмотрите
          📅 ${DATE}

          • ${SUMMARY}

          🔗 https://ararostov.github.io/urcal-sale/"

          ENCODED=$(python3 -c 'import urllib.parse,sys; print(urllib.parse.quote(sys.stdin.read()))' <<< "$MESSAGE")
          curl -s "https://api.callmebot.com/text.php?user=@aralondon&text=${ENCODED}"
