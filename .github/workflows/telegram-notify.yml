name: Telegram Notify

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram notification
        shell: bash
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          DATE=$(TZ='Europe/London' date '+%d.%m.%Y, %H:%M')
          FIRST_LINE=$(printf '%s\n' "$COMMIT_MSG" | head -1)

          MESSAGE="🏠 Обновился документ о продаже дома в Urcal 📅 ${DATE}\n\nЧто обновилось?\n• ${FIRST_LINE}\n\n🔗 Подробнее: https://ararostov.github.io/urcal-sale/"

          ENCODED=$(python3 -c 'import urllib.parse,sys; print(urllib.parse.quote(sys.stdin.read()))' <<< "$MESSAGE")
          curl -s "https://api.callmebot.com/text.php?user=@aralondon&text=${ENCODED}"
